<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Frappy Brew – LO Arcade</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="frappy-brew.css" />
</head>
<body>
  <div class="page page-fullscreen">
    <!-- Same background as One Button Hero / links / games -->
    <div class="frappy-bg" aria-hidden="true"></div>
    <div class="frappy-bg-overlay" aria-hidden="true"></div>

    <div class="game-viewport">
      <div class="canvas-wrap" id="canvasWrap">
        <canvas id="gameCanvas"></canvas>
        <div id="overlay" class="overlay">
          <div class="overlay-card" id="startCard">
            <p id="loadingText" class="loading-text">Loading…</p>
            <h2 class="ready-title">Ready?</h2>
            <p class="ready-desc">Tap or click to flap.<br />Stay alive and collect beans.</p>
            <button id="startBtn" type="button" class="btn-primary" disabled>Start</button>
          </div>
          <div class="overlay-card hidden" id="gameOverCard">
            <h2>Game Over</h2>
            <p id="summaryText"></p>
            <button id="playAgainBtn" type="button" class="btn-primary">Play Again</button>
          </div>
        </div>
      </div>
    </div>

    <div class="hud hud-overlay">
      <div class="hud-pill">
        <span>Score</span>
        <span id="scoreValue">0</span>
      </div>
      <div class="hud-pill">
        <span>Beans</span>
        <span id="beansValue">0</span>
      </div>
      <div class="hud-pill">
        <span>Best</span>
        <span id="bestValue">0</span>
      </div>
    </div>

    <a href="../../games.html" class="btn-back btn-back-float">← Back</a>

    <div class="controls-hint controls-hint-float">
      <span>Tap / Click or Spacebar to flap</span>
    </div>
  </div>

  <script src="frappy-brew.js"></script>
</body>
</html>
