<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Jigsaw Puzzle | Little Ollie Games Lab</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="description" content="Drag the pieces into place and complete the picture in the Little Ollie Jigsaw Puzzle." />
  <meta name="theme-color" content="#6fd3f2" />
  <link rel="icon" href="../../flexgrid/site/src/assets/images/LO.png" type="image/png" sizes="any" />
  <link rel="shortcut icon" href="../../flexgrid/site/src/assets/images/LO.png" type="image/png" />
  <link rel="apple-touch-icon" href="../../flexgrid/site/src/assets/images/LO.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../styles/lo-playground.css" />
  <link rel="stylesheet" href="../../home.css" />
  <link rel="stylesheet" href="../../styles/labs-nav.css" />
  <link rel="stylesheet" href="../../styles/labs-game-stage.css" />
  <link rel="stylesheet" href="../../styles/labs-game-header.css" />
  <link rel="stylesheet" href="../../styles/labs-leaderboard.css" />
  <link rel="stylesheet" href="../../styles/labs-game-switcher.css" />
  <link rel="stylesheet" href="jigsaw-puzzle.css" />
</head>
<body class="lo-playground jigsaw-puzzle-page">
  <div class="lo-playground__world" aria-hidden="true">
    <img
      class="lo-playground__bg"
      src="../../webpageassets/labplayground.jpg"
      alt=""
      width="1535"
      height="1024"
      decoding="async"
      fetchpriority="high"
    />
    <div class="lo-playground__dim"></div>
  </div>

  <main id="jigsaw-puzzle-main" class="lo-playground__content">
    <div class="lo-playground__shell jigsaw-puzzle__shell labs-game-shell">
      <div class="lo-playground__brand">
        <a href="../../index.html#labs" aria-label="Little Ollie World Labs">
          <img
            src="../../webpageassets/logo-nav.webp"
            class="lo-playground__logo"
            alt="Little Ollie"
            width="220"
            height="64"
            decoding="async"
          />
        </a>
      </div>

      <div class="lo-playground__card jigsaw-puzzle__card labs-game-card">
        <header class="labs-game-head">
          <p class="lo-playground__eyebrow">Games Lab</p>
          <h1 class="lo-playground__title labs-game-head__title">
            Jigsaw <span class="lo-playground__title-accent">Puzzle</span>
          </h1>
          <p class="lo-playground__lead labs-game-head__lead jigsaw-puzzle__lead" id="jigsaw-lead">See the picture, press Start, then rebuild it from the tray.</p>
        </header>

        <div class="jigsaw-puzzle__difficulty">
          <label for="difficulty-select">Difficulty</label>
          <select id="difficulty-select" class="jigsaw-puzzle__select" aria-label="Difficulty">
            <option value="3">Easy (3×3)</option>
            <option value="4">Medium (4×4)</option>
            <option value="6">Hard (6×6)</option>
            <option value="8">Expert (8×8)</option>
          </select>
        </div>

        <button type="button" id="btn-start" class="home-btn jigsaw-puzzle-btn jigsaw-puzzle-btn--green jigsaw-puzzle__start-btn">Start puzzle</button>

        <div class="labs-game-card__stage-grow">
          <div class="jigsaw-puzzle__play-area labs-game-slot">
            <div id="jigsaw-board-wrap" class="jigsaw-puzzle__board-wrap labs-game-stage">
              <div id="jigsaw-board" class="jigsaw-puzzle__board" role="grid" aria-label="Puzzle board"></div>
            </div>
            <div class="jigsaw-puzzle__tray-shell" aria-label="Puzzle piece tray">
              <p class="jigsaw-puzzle__tray-label">Piece tray</p>
              <div id="jigsaw-tray" class="jigsaw-puzzle__tray"></div>
            </div>
          </div>
        </div>

        <div class="jigsaw-puzzle__actions">
          <div class="jigsaw-puzzle__actions-row">
            <button type="button" id="btn-new-image" class="home-btn jigsaw-puzzle-btn jigsaw-puzzle-btn--yellow">New random image</button>
            <button type="button" id="uploadImageBtn" class="home-btn jigsaw-puzzle-btn jigsaw-puzzle-btn--blue">Upload your own</button>
          </div>
          <button type="button" id="leaderboardBtn" class="home-btn jigsaw-puzzle-btn jigsaw-puzzle-btn--purple">Your scores</button>
          <a href="../../links/" class="labs-back-to-hub labs-back-to-hub--block labs-back-to-hub--green">← Back to Games Lab</a>
        </div>
      </div>

      <p class="lo-playground__foot">Little Ollie Labs • The Playground</p>
    </div>
  </main>

  <input type="file" id="imageUpload" accept="image/*" hidden aria-hidden="true" />

  <div id="jigsaw-drag-layer" class="jigsaw-puzzle__drag-layer" aria-hidden="true"></div>

  <canvas id="jigsaw-confetti" class="jigsaw-puzzle__confetti" aria-hidden="true"></canvas>

  <div id="jigsawWinOverlay" class="jigsaw-puzzle__win hidden" aria-hidden="true" role="dialog" aria-labelledby="jigsawWinTitle" aria-modal="true">
    <div class="jigsaw-puzzle__win-card">
      <div class="jigsaw-puzzle__win-spark" aria-hidden="true">⭐</div>
      <h2 id="jigsawWinTitle" class="jigsaw-puzzle__win-title">Puzzle Complete!</h2>
      <p id="jigsawWinStats" class="jigsaw-puzzle__win-stats"></p>
      <p id="jigsawWinBest" class="jigsaw-puzzle__win-best"></p>
      <button type="button" id="jigsawPlayAgainBtn" class="home-btn jigsaw-puzzle-btn jigsaw-puzzle-btn--green">Play again</button>
    </div>
  </div>

  <div id="leaderboardModal" class="leaderboard-overlay hidden" aria-hidden="true" role="dialog" aria-labelledby="leaderboardTitle" aria-modal="true">
    <div class="leaderboard-card">
      <img src="../../webpageassets/logo-nav.webp" class="leaderboard-logo" alt="Little Ollie" width="200" height="58" decoding="async" />
      <h2 id="leaderboardTitle" class="leaderboard-title">Your best scores</h2>
      <p class="labs-local-note">Saved on this device only.</p>
      <div class="leaderboard-tabs" role="tablist" aria-label="Difficulty">
        <button type="button" data-diff="easy" role="tab">Easy</button>
        <button type="button" data-diff="medium" role="tab">Medium</button>
        <button type="button" data-diff="hard" role="tab">Hard</button>
        <button type="button" data-diff="expert" role="tab">Expert</button>
      </div>
      <div id="leaderboardList" class="leaderboard-list-popup"></div>
      <div id="jigsawLeaderboardSubmitSection" class="leaderboard-submit-section hidden">
        <p class="leaderboard-submit-heading">🎉 Puzzle complete!</p>
        <p id="jigsawLeaderboardYourScore" class="leaderboard-your-score">Your time: 0:00 • Moves: 0</p>
        <input type="text" id="jigsawLeaderboardNameInput" placeholder="Your name" maxlength="30" autocomplete="nickname" />
        <div class="leaderboard-submit-actions">
          <button type="button" id="jigsawLeaderboardSubmitBtn" class="home-btn jigsaw-puzzle-btn jigsaw-puzzle-btn--yellow">Submit score</button>
          <button type="button" id="jigsawLeaderboardPlayAgainBtn" class="home-btn jigsaw-puzzle-btn jigsaw-puzzle-btn--green">Play again</button>
        </div>
        <p id="jigsawLeaderboardSubmitMsg" class="leaderboard-submit-msg"></p>
      </div>
      <button type="button" id="closeLeaderboard" class="home-btn jigsaw-puzzle-btn jigsaw-puzzle-btn--blue leaderboard-close-btn">Close</button>
    </div>
  </div>

  <script type="module" src="../../scripts/labs-leaderboard-ui.js"></script>
  <script type="module" src="../../scripts/labs-game-switcher.js"></script>
  <script type="module" src="leaderboard-local.js"></script>
  <script type="module" src="jigsaw-puzzle.js"></script>
</body>
</html>
