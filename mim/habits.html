<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Habits — Motivation in Motion</title>
  <link rel="icon" href="icons/mim.jpg" type="image/jpeg" sizes="any" />
  <link rel="apple-touch-icon" href="icons/mim.jpg" />
  <meta property="og:image" content="icons/mim.jpg" />
  <meta property="og:title" content="Motivation in Motion" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="body-with-bottom-nav">
  <script>try{document.body.classList.toggle("dark-mode",localStorage.getItem("motivation-in-motion-dark-mode")==="true");}catch(e){}</script>
  <main class="app-shell">
    <header class="app-branding">
      <h1 class="app-title">Motivation in Motion</h1>
      <p class="app-powered-by">Powered by Little Ollie Labs</p>
    </header>
    <header class="top-header">
      <h1>Your Habits</h1>
      <a href="index.html" class="button-secondary">Back</a>
    </header>

    <section class="card habits-section">
      <h2 class="card-label">Your habits</h2>
      <div id="habitsError" class="habits-error" role="alert" aria-live="polite" hidden></div>
      <div id="habitList" class="habit-list" aria-live="polite">
        <p class="habits-empty">Loading…</p>
      </div>

      <div class="habits-add-actions">
        <button type="button" id="addFromLibraryBtn" class="button-primary">
          Add from Habit Library
        </button>
        <button type="button" id="createCustomHabitBtn" class="button-secondary">
          Create Custom Habit
        </button>
      </div>

      <form id="addHabitForm" class="habits-add-form habits-add-form--custom" hidden>
        <label for="newHabitInput" class="visually-hidden">New habit name</label>
        <input
          id="newHabitInput"
          type="text"
          class="input-field"
          placeholder="Add a new habit..."
          autocomplete="off"
          maxlength="100"
        />
        <label class="habit-share-wrap">
          <input type="checkbox" id="newHabitShare" class="habit-share-input" />
          <span class="habit-share-label">Share this habit with groups</span>
        </label>
        <button type="submit" id="addHabitBtn" class="button-primary full-width">
          Add Habit
        </button>
      </form>
    </section>

    <footer class="app-footer">© 2026 Little Ollie Labs</footer>
  </main>

  <!-- Delete habit confirmation modal -->
  <div id="habitDeleteModal" class="habit-delete-modal" role="dialog" aria-modal="true" aria-labelledby="habitDeleteModalTitle" aria-hidden="true" hidden>
    <div class="habit-delete-modal-backdrop" id="habitDeleteModalBackdrop"></div>
    <div class="habit-delete-modal-content">
      <h2 id="habitDeleteModalTitle" class="habit-delete-modal-title">Delete Habit</h2>
      <p id="habitDeleteModalMessage" class="habit-delete-modal-message"></p>
      <div class="habit-delete-modal-actions">
        <button type="button" id="habitDeleteModalCancelBtn" class="button-secondary">Cancel</button>
        <button type="button" id="habitDeleteModalConfirmBtn" class="button-primary button-danger">Delete</button>
      </div>
    </div>
  </div>

  <!-- Habit Library modal -->
  <div id="habitLibraryModal" class="habit-library-modal" role="dialog" aria-modal="true" aria-labelledby="habitLibraryModalTitle" aria-hidden="true" hidden>
    <div class="habit-library-modal-backdrop" id="habitLibraryModalBackdrop"></div>
    <div class="habit-library-modal-content">
      <h2 id="habitLibraryModalTitle" class="habit-library-modal-title">Add from Habit Library</h2>
      <div id="habitLibraryList" class="habit-library-list"></div>
      <button type="button" id="habitLibraryModalCloseBtn" class="button-secondary full-width">Cancel</button>
    </div>
  </div>

  <nav class="bottom-nav" aria-label="Main">
    <a href="index.html" class="bottom-nav-item" data-page="home"><span>🏠</span><span>Dashboard</span></a>
    <a href="habits.html" class="bottom-nav-item bottom-nav-item--active" data-page="habits"><span>🧠</span><span>Habits</span></a>
    <a href="challenges.html" class="bottom-nav-item" data-page="challenges"><span>🎯</span><span>Challenges</span></a>
    <a href="badges.html" class="bottom-nav-item" data-page="badges"><span>🏆</span><span>Badges</span></a>
    <a href="groups.html" class="bottom-nav-item" data-page="groups"><span>👥</span><span>Groups</span></a>
    <a href="profile.html" class="bottom-nav-item" data-page="profile"><span>👤</span><span>Profile</span></a>
    <a href="settings.html" class="bottom-nav-item" data-page="settings"><span>⚙️</span><span>Settings</span></a>
  </nav>
  <script type="module" src="js/habits.js"></script>
</body>
</html>
