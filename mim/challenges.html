<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Challenges — Motivation in Motion</title>
  <link rel="icon" href="icons/mim.jpg" type="image/jpeg" sizes="any" />
  <link rel="apple-touch-icon" href="icons/mim.jpg" />
  <meta property="og:image" content="icons/mim.jpg" />
  <meta property="og:title" content="Motivation in Motion" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="body-with-bottom-nav">
  <script>try{document.body.classList.toggle("dark-mode",localStorage.getItem("motivation-in-motion-dark-mode")==="true");}catch(e){}</script>
  <main class="app-shell">
    <header class="app-branding">
      <h1 class="app-title">Motivation in Motion</h1>
      <p class="app-powered-by">Powered by Little Ollie Labs</p>
    </header>
    <header class="top-header">
      <h1>Challenges</h1>
      <a href="index.html" class="button-secondary">Back</a>
    </header>

    <section class="card">
      <p class="muted-text">Challenges are temporarily disabled. Return to the <a href="index.html">Dashboard</a> to track your habits.</p>
    </section>

    <footer class="app-footer">© 2026 Little Ollie Labs</footer>
  </main>

  <nav class="bottom-nav" aria-label="Main">
    <a href="index.html" class="bottom-nav-item" data-page="home"><span>🏠</span><span>Dashboard</span></a>
    <a href="habits.html" class="bottom-nav-item" data-page="habits"><span>🧠</span><span>Habits</span></a>
    <a href="challenges.html" class="bottom-nav-item bottom-nav-item--active" data-page="challenges"><span>🎯</span><span>Challenges</span></a>
    <a href="badges.html" class="bottom-nav-item" data-page="badges"><span>🏆</span><span>Badges</span></a>
    <a href="groups.html" class="bottom-nav-item" data-page="groups"><span>👥</span><span>Groups</span></a>
    <a href="profile.html" class="bottom-nav-item" data-page="profile"><span>👤</span><span>Profile</span></a>
    <a href="settings.html" class="bottom-nav-item" data-page="settings"><span>⚙️</span><span>Settings</span></a>
  </nav>
  <script>
    (function () {
      var path = window.location.pathname || '';
      var page = 'home';
      if (path.indexOf('habits') !== -1) page = 'habits';
      else if (path.indexOf('challenges') !== -1) page = 'challenges';
      else if (path.indexOf('badges') !== -1) page = 'badges';
      else if (path.indexOf('groups') !== -1 && path.indexOf('group.html') === -1) page = 'groups';
      else if (path.indexOf('group.html') !== -1) page = 'groups';
      else if (path.indexOf('profile') !== -1) page = 'profile';
      else if (path.indexOf('settings') !== -1) page = 'settings';
      document.querySelectorAll('.bottom-nav-item').forEach(function (a) {
        a.classList.toggle('bottom-nav-item--active', a.getAttribute('data-page') === page);
      });
    })();
  </script>

  <!-- Challenges temporarily disabled - no challenge logic loaded -->
</body>
</html>
