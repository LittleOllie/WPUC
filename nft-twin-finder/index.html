<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>NFT Twin Finder — Little Ollie Labs</title>
  <meta name="description" content="Find the closest looking NFT in your collection using trait similarity." />
  <link rel="icon" href="../flexgrid/site/src/assets/images/LO.png" type="image/png" sizes="any" />
  <link rel="shortcut icon" href="../flexgrid/site/src/assets/images/LO.png" type="image/png" />
  <link rel="apple-touch-icon" href="../flexgrid/site/src/assets/images/LO.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="ntf-page">
    <!-- Search -->
    <section id="screen-search" class="ntf-screen is-active" aria-label="Search">
      <a href="../links/" class="ntf-back">← Back</a>

      <header class="ntf-hero">
        <img
          class="ntf-hero__mascot"
          src="../dopeornope/assets/lo1.png"
          alt=""
          width="360"
          height="360"
          decoding="async"
        />
        <h1 class="ntf-hero__title">NFT TWIN FINDER</h1>
        <p class="ntf-hero__sub">Find your closest lookalike in the collection</p>
      </header>

      <div class="ntf-panel">
        <div class="ntf-field">
          <label class="ntf-field__label" for="collection-select">Collection</label>
          <select id="collection-select" class="ntf-select" disabled>
            <option value="">Loading collections…</option>
          </select>
        </div>

        <div class="ntf-field">
          <label class="ntf-field__label" for="token-input">NFT Number</label>
          <input
            id="token-input"
            class="ntf-input"
            type="text"
            inputmode="numeric"
            placeholder="#437"
            autocomplete="off"
          />
        </div>

        <button id="find-btn" class="ntf-btn ntf-btn--accent" type="button" disabled>
          Find My Twin
        </button>

        <p id="search-error" class="ntf-error" hidden></p>
      </div>
    </section>

    <!-- Loading + twin reveal -->
    <section id="screen-loading" class="ntf-screen" aria-label="Loading" aria-live="polite">
      <div class="ntf-loading">
        <div id="ntf-reveal-stage" class="ntf-reveal" hidden>
          <div class="ntf-reveal__frame">
            <div class="ntf-reveal__merged">
              <div id="ntf-reveal-half-a" class="ntf-reveal__half ntf-reveal__half--a" aria-hidden="true"></div>
              <div id="ntf-reveal-half-b" class="ntf-reveal__half ntf-reveal__half--b" aria-hidden="true"></div>
            </div>
            <div id="ntf-reveal-lightning" class="ntf-reveal__lightning" aria-hidden="true"></div>
            <div class="ntf-reveal__flash" aria-hidden="true"></div>
          </div>
        </div>
        <div
          id="loading-bar"
          class="ntf-loading-bar"
          role="progressbar"
          aria-valuemin="0"
          aria-valuemax="100"
          aria-valuenow="0"
          aria-label="Loading twins"
        >
          <span class="ntf-loading-bar__fill"></span>
        </div>
        <div class="ntf-spinner" hidden aria-hidden="true"></div>
        <p id="loading-message" class="ntf-loading__msg">Checking traits...</p>
      </div>
    </section>

    <!-- Results -->
    <section id="screen-results" class="ntf-screen" aria-label="Results">
      <button id="results-back-btn" class="ntf-back" type="button">← Back</button>

      <header class="ntf-hero">
        <img
          class="ntf-hero__mascot"
          src="../dopeornope/assets/lo1.png"
          alt=""
          width="360"
          height="360"
          decoding="async"
        />
        <h1 class="ntf-hero__title">YOUR TWINS</h1>
        <p class="ntf-hero__sub">Closest matches in the collection</p>
      </header>

      <div id="duo-hero" class="ntf-duo-hero"></div>

      <button id="search-again-btn" class="ntf-btn ntf-btn--ghost ntf-btn--after-match" type="button">
        Search again
      </button>

      <p id="compare-hint" class="ntf-compare-hint" hidden>
        Tap any match below to swap it into the comparison.
      </p>

      <h2 id="more-twins-title" class="ntf-section-title" hidden>All Close Matches</h2>
      <div id="twin-list" class="ntf-twin-list"></div>
    </section>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
