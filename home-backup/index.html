<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Little Ollie Labs</title>
<link rel="icon" href="flexgrid/site/src/assets/images/LO.png" type="image/png" sizes="any" />
<link rel="shortcut icon" href="flexgrid/site/src/assets/images/LO.png" type="image/png" />
<link rel="apple-touch-icon" href="flexgrid/site/src/assets/images/LO.png" />

<!-- Open Graph -->
<meta property="og:title" content="Little Ollie Labs" />
<meta property="og:description" content="Where little ideas are tested and brought to life. Games, stories &amp; digital collectibles from the Little Ollie Playground Labs." />
<meta property="og:image" content="https://littleollielabs.com/preview.jpg" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta property="og:url" content="https://littleollielabs.com/" />
<meta property="og:type" content="website" />

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="Little Ollie Labs" />
<meta name="twitter:description" content="Where little ideas are tested and brought to life." />
<meta name="twitter:image" content="https://littleollielabs.com/preview.jpg" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles/site-brand.css" />
<link rel="stylesheet" href="home.css" />

</head>
<body>

    <div class="sky">
        <div class="hero-bg" aria-hidden="true"></div>

        <div class="hero-clouds" aria-hidden="true">
            <img src="assets/cloud1.webp" class="cloud cloud-1" alt="" />
            <img src="assets/cloud2.webp" class="cloud cloud-2" alt="" />
            <img src="assets/cloud3.webp" class="cloud cloud-3" alt="" />
        </div>

        <main class="hero-content">
            <div class="hero-intro">
                <div class="hero-logo">
                    <img src="assets/websitemainlogo.png" class="hero-logo__img" alt="Little Ollie — Where little ideas are tested and brought to life." decoding="async" />
                </div>
            </div>

            <div class="hero-cta">
                <a href="links/" class="hero-cta__btn" id="playgroundLink">Enter the Playground Labs</a>
            </div>
        </main>

        <div id="home-liquid-curtain" class="home-liquid-curtain" aria-hidden="true"></div>
    </div>

<script type="module" src="home.js"></script>

</body>
</html>
