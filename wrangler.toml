name = "ogenie-cert-checker"
main = "src/index.js"
compatibility_date = "2024-10-01"

[vars]
# OGenie NFT (OpenSea collection ogenienft) — must match the contract you hold.
# If this was wrong, Alchemy returns zero OGENIEs while CERT can still show.
OGENIE_CONTRACT = "0x5b12e009e1b5f14b1e8f3a3b9fb3ca165702dcbd"
CERT_CONTRACT = "0x0C212fdB58d31e36039EfA2c85DFB0482Af8F2ee"
# Highest token ID that exists for the CERT collection on-chain (OGENIE IDs above this have no matching CERT).
CERT_MAX_TOKEN_ID = "1000"

# Serves public/index.html, style.css, app.js from your Worker URL.
# Requests that do not match a file (e.g. /api/wallet) are handled by src/index.js.
[assets]
directory = "./public"
