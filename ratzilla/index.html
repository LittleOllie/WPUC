<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>RATZILLA — Transmission</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="robots" content="noindex" />
    <meta
      name="description"
      content="An underground transmission. Blackwater opens soon."
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="rz-body">
    <div class="rz-stage" id="rzStage">
      <div class="rz-curtain" id="rzCurtain" aria-hidden="true"></div>

      <!-- Layer 1: cinematic BG + parallax -->
      <div class="rz-bg" id="rzBg" aria-hidden="true">
        <img
          class="rz-bg__img"
          src="assets/ratzillaBG.png"
          alt=""
          width="1920"
          height="1080"
          draggable="false"
          decoding="async"
        />
        <div class="rz-bg__depth"></div>
        <div class="rz-bg__wash"></div>
      </div>

      <!-- Layer 2: wet floor reflection -->
      <div class="rz-reflect" aria-hidden="true">
        <div class="rz-reflect__mirror"></div>
        <div class="rz-reflect__sheen"></div>
      </div>

      <!-- Layer 3: environmental light -->
      <div class="rz-lights" aria-hidden="true">
        <div class="rz-lights__warn rz-lights__warn--a"></div>
        <div class="rz-lights__warn rz-lights__warn--b"></div>
        <div class="rz-lights__crt"></div>
        <div class="rz-lights__fill"></div>
      </div>

      <!-- Layer 4: fog / smoke -->
      <div class="rz-atmo" aria-hidden="true">
        <div class="rz-fog rz-fog--1" id="rzFog1"></div>
        <div class="rz-fog rz-fog--2" id="rzFog2"></div>
        <div class="rz-fog rz-fog--3"></div>
        <div class="rz-haze"></div>
        <div class="rz-dust"></div>
      </div>

      <!-- Layer 5: faction marks -->
      <img
        src="assets/RatLogo.png"
        alt=""
        class="rz-skull"
        width="256"
        height="256"
        draggable="false"
        id="rzSkull"
      />

      <div class="rz-signal" id="rzSignal" title="">
        <div class="rz-signal__bloom"></div>
        <img
          src="assets/RLogo.png"
          alt=""
          class="rz-signal__r"
          width="140"
          height="140"
          draggable="false"
        />
      </div>

      <!-- Layer 6: hero -->
      <main class="rz-hero" id="rzHero">
        <div class="rz-logo-stack">
          <div class="rz-rat-wrap" aria-hidden="true">
            <img
              src="assets/rat.png"
              alt=""
              class="rz-rat-behind"
              width="640"
              height="480"
              draggable="false"
            />
          </div>
          <img
            src="assets/RatzillaLogo.png"
            alt="RATZILLA"
            class="rz-logo"
            width="560"
            height="180"
            draggable="false"
            id="rzLogo"
          />
        </div>
        <div class="rz-terminal" aria-live="polite">
          <p class="rz-terminal__line">
            <span class="rz-terminal__text" id="rzType"></span
            ><span class="rz-cursor" id="rzCursor" aria-hidden="true"></span>
          </p>
        </div>
      </main>

      <!-- Layer 7: rare events -->
      <div class="rz-event rz-event--flash" id="rzFlash" aria-hidden="true"></div>
      <div class="rz-event rz-event--coords" id="rzCoords" aria-hidden="true"></div>
      <div class="rz-event rz-event--warn" id="rzWarning" aria-hidden="true">
        CONTAINMENT BREACH — SECTOR 7G
      </div>
      <div class="rz-eyes" id="rzEyes" aria-hidden="true"></div>

      <!-- Layer 8: CRT stack -->
      <div class="rz-fx" aria-hidden="true">
        <div class="rz-fx__grain"></div>
        <div class="rz-fx__scan"></div>
        <div class="rz-fx__noise"></div>
        <div class="rz-fx__chroma"></div>
        <div class="rz-fx__vignette"></div>
        <div class="rz-fx__jitter" id="rzJitter"></div>
      </div>

      <button
        type="button"
        class="rz-mute"
        id="rzMute"
        aria-label="Toggle ambient sound"
      >
        <span class="rz-mute__on" aria-hidden="true">SND</span>
        <span class="rz-mute__off" aria-hidden="true">—</span>
      </button>
    </div>

    <audio id="rzAudio" class="rz-audio" loop preload="none">
      <!-- <source src="assets/ambience.mp3" type="audio/mpeg" /> -->
    </audio>

    <script src="script.js" defer></script>
  </body>
</html>
