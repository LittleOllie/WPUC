<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>DDG — Gorgez Template</title>
    <meta name="theme-color" content="#0b0c12" />
    <link rel="preload" href="assets/DDGLogo.png" as="image" type="image/png" fetchpriority="high" />
    <link rel="preload" href="assets/LOLogo.png" as="image" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css?v=dataUrlLink1" />
  </head>
  <body>
    <div id="bootLoading" class="bootLoading" aria-live="polite" aria-busy="true" aria-label="Loading">
      <div class="bootLoading__inner">
        <img
          class="bootLoading__logo"
          src="assets/DDGLogo.png"
          width="160"
          height="160"
          alt=""
          decoding="async"
          fetchpriority="high"
        />
        <p class="bootLoading__text">Loading…</p>
      </div>
    </div>
    <a class="hubBackBtn" href="../links/" aria-label="Back to Links">
      <span class="hubBackBtn__icon" aria-hidden="true">←</span>
      <span class="hubBackBtn__text">Back to Links</span>
    </a>
    <main class="app">
      <section class="card" id="card">
        <header class="header">
          <div class="brandRow" id="brandRow" aria-label="Little Ollie x DDG">
            <div class="brandLogoWrap">
              <img id="loLogoHeader" class="brandLogo hidden" alt="Little Ollie" />
              <div id="loLogoFallback" class="brandLogoFallback">LO</div>
            </div>
            <div class="brandX">×</div>
            <div class="brandLogoWrap">
              <img id="ddgLogoHeader" class="brandLogo hidden" alt="DDG" />
              <div id="ddgLogoFallback" class="brandLogoFallback">DDG</div>
            </div>
          </div>
        </header>

        <div class="stage" id="stage">
          <div
            class="canvasWrap"
            id="canvasWrap"
            title="Download = named JPG. Right-click the card: if Save Image is “Unknown”, use Download Linked File or Save Link As for a .jpg name."
          >
            <canvas id="canvas" width="1024" height="1193" aria-label="Template preview"></canvas>
            <a
              id="canvasExportMirrorLink"
              class="canvasExportMirrorLink"
              href="#"
              download="ddg-gorgez.jpg"
              aria-hidden="true"
            >
              <img
                id="canvasExportMirror"
                class="canvasExportMirror"
                alt=""
                draggable="false"
                decoding="async"
                aria-hidden="true"
              />
            </a>

            <div class="frameHint" id="frameHint" aria-hidden="true">
              <div class="frameHintInner">
                <img id="ddgLogoInFrame" class="frameLogo hidden" alt="DDG logo" />
                <div id="ddgLogoInFrameFallback" class="frameLogoFallback">DDG</div>
                <label class="btn primary big frameUploadBtn" for="fileInput">
                  <span class="btnText">UPLOAD DDG <span class="frameUploadSkull" aria-hidden="true">💀</span></span>
                  <input id="fileInput" type="file" accept="image/png,image/jpeg,image/webp" />
                </label>
              </div>
            </div>

            <div class="processingOverlay hidden" id="processingOverlay" aria-hidden="true">
              <div class="scanText" id="scanText">Checking your Gorgez level…</div>
            </div>

            <div class="shutter hidden" id="shutter" aria-hidden="true">
              <div class="shutterBar top"></div>
              <div class="shutterBar bottom"></div>
            </div>

            <div class="flash hidden" id="flash" aria-hidden="true"></div>
          </div>

          <div class="actions">
            <button class="btn blue big" id="changeTemplateBtn" type="button">CHANGE TEMPLATE</button>
            <div class="customSloganWrap" id="customSloganWrap">
              <button
                type="button"
                class="btn blue big customSloganBtn"
                id="customSloganBtn"
                aria-expanded="false"
                aria-controls="customSloganPanel"
              >
                CUSTOM SLOGAN
              </button>
              <div
                class="customSloganPanel hidden"
                id="customSloganPanel"
                role="region"
                aria-label="Custom slogan"
              >
                <textarea
                  id="sloganInput"
                  class="input customSloganInput"
                  rows="3"
                  maxlength="200"
                  spellcheck="true"
                  autocapitalize="off"
                  autocorrect="off"
                  autocomplete="off"
                  aria-label="Custom slogan"
                  placeholder="Type your slogan…"
                ></textarea>
              </div>
            </div>
            <button class="btn primary alt big hidden" id="downloadBtn" type="button">DOWNLOAD IMAGE</button>
            <button class="btn primary alt big hidden" id="tryAnotherBtn" type="button">TRY ANOTHER</button>
          </div>
        </div>
      </section>

      <div
        id="templatePickerOverlay"
        class="templatePickerOverlay hidden"
        aria-hidden="true"
      >
        <div
          class="templatePickerModal"
          role="dialog"
          aria-modal="true"
          aria-labelledby="templatePickerTitle"
        >
          <header class="templatePickerHeader">
            <div class="templatePickerBrandRow brandRow" aria-label="Little Ollie x DDG">
              <div class="brandLogoWrap">
                <img
                  class="brandLogo templatePickerBrandLo"
                  src="assets/LOLogo.png"
                  alt="Little Ollie"
                  width="120"
                  height="68"
                  decoding="async"
                />
              </div>
              <div class="brandX">×</div>
              <div class="brandLogoWrap">
                <img
                  class="brandLogo templatePickerBrandDdg"
                  src="assets/DDGLogo.png"
                  alt="DDG"
                  width="200"
                  height="190"
                  decoding="async"
                />
              </div>
            </div>
          </header>
          <div class="templatePickerHead">
            <h2 class="templatePickerTitle" id="templatePickerTitle">Choose a template</h2>
            <button type="button" class="templatePickerClose" id="templatePickerClose" aria-label="Close">
              ×
            </button>
          </div>
          <p class="templatePickerSub hint">Tap a layout — your Gorgez photo is kept if you already uploaded one.</p>
          <div class="templatePickerList" id="templatePickerGrid" role="listbox" aria-label="Template previews"></div>
        </div>
      </div>

      <footer class="appPoweredBy" role="contentinfo" aria-label="Credits">
        <p>POWERED BY LITTLE OLLIE LABS</p>
      </footer>
    </main>

    <script type="module" src="app.js?v=dataUrlLink1"></script>
  </body>
</html>
