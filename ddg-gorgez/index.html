<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>DDG — Gorgez Template</title>
    <meta name="theme-color" content="#0b0c12" />
    <link rel="preload" href="assets/DDGTemplate.png" as="image" type="image/png" fetchpriority="high" />
    <link rel="preload" href="assets/DDGLogo.png" as="image" type="image/png" fetchpriority="high" />
    <link rel="preload" href="assets/LOLogo.png" as="image" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css?v=namedJpeg1" />
  </head>
  <body>
    <div id="bootLoading" class="bootLoading" aria-live="polite" aria-busy="true" aria-label="Loading">
      <div class="bootLoading__inner">
        <img
          class="bootLoading__logo"
          src="assets/DDGLogo.png"
          width="160"
          height="160"
          alt=""
          decoding="async"
          fetchpriority="high"
        />
        <p class="bootLoading__text">Loading…</p>
      </div>
    </div>
    <a class="hubBackBtn" href="../links/" aria-label="Back to Links">
      <span class="hubBackBtn__icon" aria-hidden="true">←</span>
      <span class="hubBackBtn__text">Back to Links</span>
    </a>
    <main class="app">
      <section class="card" id="card">
        <header class="header">
          <div class="brandRow" id="brandRow" aria-label="Little Ollie x DDG">
            <div class="brandLogoWrap">
              <img id="loLogoHeader" class="brandLogo hidden" alt="Little Ollie" />
              <div id="loLogoFallback" class="brandLogoFallback">LO</div>
            </div>
            <div class="brandX">×</div>
            <div class="brandLogoWrap">
              <img id="ddgLogoHeader" class="brandLogo hidden" alt="DDG" />
              <div id="ddgLogoFallback" class="brandLogoFallback">DDG</div>
            </div>
          </div>
        </header>

        <div class="stage" id="stage">
          <div
            class="canvasWrap"
            id="canvasWrap"
            title="Use Download, or right-click / long-press the card image to save as JPG."
          >
            <canvas id="canvas" width="1024" height="1193" aria-label="Template preview"></canvas>
            <img
              id="canvasExportMirror"
              class="canvasExportMirror"
              alt=""
              draggable="false"
              decoding="async"
              aria-hidden="true"
            />

            <div class="frameHint" id="frameHint" aria-hidden="true">
              <div class="frameHintInner">
                <img id="ddgLogoInFrame" class="frameLogo hidden" alt="DDG logo" />
                <div id="ddgLogoInFrameFallback" class="frameLogoFallback">DDG</div>
                <label class="btn primary big frameUploadBtn" for="fileInput">
                  <span class="btnText">UPLOAD DDG</span>
                  <input id="fileInput" type="file" accept="image/png,image/jpeg,image/webp" />
                </label>
              </div>
            </div>

            <div class="processingOverlay hidden" id="processingOverlay" aria-hidden="true">
              <div class="scanText" id="scanText">Checking your Gorgez level…</div>
            </div>

            <div class="shutter hidden" id="shutter" aria-hidden="true">
              <div class="shutterBar top"></div>
              <div class="shutterBar bottom"></div>
            </div>

            <div class="flash hidden" id="flash" aria-hidden="true"></div>
          </div>

          <div class="actions">
            <button class="btn primary alt big hidden" id="downloadBtn" type="button">DOWNLOAD IMAGE</button>
            <button class="btn primary alt big hidden" id="tryAnotherBtn" type="button">TRY ANOTHER</button>
          </div>
        </div>
      </section>

      <footer class="appPoweredBy" role="contentinfo" aria-label="Credits">
        <p>POWERED BY LITTLE OLLIE LABS</p>
      </footer>
    </main>

    <script type="module" src="app.js?v=namedJpeg1"></script>
  </body>
</html>
