<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Moved to OGT</title>
    <link rel="canonical" href="/OGT/" />
    <meta http-equiv="refresh" content="0; url=/OGT/" />
    <script>
      (function () {
        var p = location.pathname || "";
        var segs = p.split("/");
        for (var i = 0; i < segs.length; i++) {
          if (segs[i].toLowerCase() === "ogtnew") segs[i] = "OGT";
        }
        var next = segs.join("/");
        if (next === "") next = "/";
        if (next === "/OGT") next = "/OGT/";
        if (p.endsWith("/") && !next.endsWith("/")) next += "/";
        location.replace(location.origin + next + location.search + location.hash);
      })();
    </script>
  </head>
  <body>
    <p>
      This app has moved to
      <a href="/OGT/">OGenie × Cert Checker</a>.
    </p>
  </body>
</html>
