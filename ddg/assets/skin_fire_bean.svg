       C 20 60  12 54  10 46
       C 6 38  9 28  12 32
       C 10 24  14 14  18 20
       C 20 10  26 2  32 1
       Z"
  />
  <!-- Mid flicker (left tongue) -->
  <path
    fill="url(#flameSide)"
    opacity="0.88"
    d="M22 8
       C 18 16  16 28  18 38
       C 20 46  26 52  30 56
       C 24 48  20 38  22 28
       C 22 18  22 12  22 8
       Z"
  />
  <!-- Mid flicker (right tongue — mirror of left) -->
  <g transform="translate(64,0) scale(-1,1)">
    <path
      fill="url(#flameSide)"
      opacity="0.88"
      d="M22 8
         C 18 16  16 28  18 38
         C 20 46  26 52  30 56
         C 24 48  20 38  22 28
         C 22 18  22 12  22 8
