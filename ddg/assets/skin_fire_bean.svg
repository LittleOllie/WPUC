<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" aria-hidden="true">
  <defs>
    <linearGradient id="flameOuter" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#4a0e00"/>
      <stop offset="22%" stop-color="#a93226"/>
      <stop offset="48%" stop-color="#e74c3c"/>
      <stop offset="72%" stop-color="#f39c12"/>
      <stop offset="100%" stop-color="#fff9e0"/>
    </linearGradient>
    <radialGradient id="flameCore" cx="42%" cy="52%" r="52%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="25%" stop-color="#fff3a0"/>
      <stop offset="55%" stop-color="#ffc107"/>
      <stop offset="100%" stop-color="#e65100"/>
    </radialGradient>
    <linearGradient id="flameSide" x1="0%" y1="50%" x2="100%" y2="50%">
