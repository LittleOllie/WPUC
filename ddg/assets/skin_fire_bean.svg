  </g>
  <!-- Hot core -->
  <path
    fill="url(#flameCore)"
    d="M32 18
       C 38 24  40 36  36 46
       C 34 52  32 56  32 58
       C 32 56  30 52  28 46
       C 24 36  26 24  32 18
       Z"
