<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Page not found</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      (function () {
        var CANON = "OGT";

        var loc = window.location;
        var p = loc.pathname;
        var segs = p.split("/");

        function isOgtAppSeg(s) {
          var x = (s || "").toLowerCase();
          return x === "ogt" || x === "ogtnew";
        }

        function appSegmentIndex() {
          for (var i = 0; i < segs.length; i++) {
            if (isOgtAppSeg(segs[i])) return i;
          }
          return -1;
        }

        function tryFetch(path, method) {
          return fetch(path, {
            method: method,
            redirect: "follow",
            credentials: "same-origin",
            cache: "no-store",
          }).then(function (r) {
            return r.ok || r.status === 304 || (r.status >= 200 && r.status < 400);
          });
        }

        /** GitHub Pages directory URLs need a trailing slash; bare /OGT often 404s. */
        function expandWithSlashVariants(paths) {
          var out = [];
          paths.forEach(function (path) {
            var variants = [path];
            if (path.length > 1 && path.endsWith("/")) {
              variants.push(path.replace(/\/+$/, ""));
            } else if (path.length > 1 && !path.endsWith("/")) {
              variants.push(path + "/");
            }
            variants.forEach(function (v) {
              if (v && out.indexOf(v) === -1) out.push(v);
            });
          });
          return out;
        }

        async function run() {
          var idx = appSegmentIndex();
          if (idx === -1) return;

          var nonEmpty = segs.filter(Boolean);
          if (
            nonEmpty.length === 1 &&
            isOgtAppSeg(nonEmpty[0]) &&
            !p.endsWith("/")
          ) {
            loc.replace(loc.origin + "/" + CANON + "/" + loc.search + loc.hash);
            return;
          }

          function buildPath(segmentValue) {
            var copy = segs.slice();
            copy[idx] = segmentValue;
            var next = copy.join("/");
            if (next === "") next = "/";
            if (p.endsWith("/") && !next.endsWith("/")) next += "/";
            return next;
          }

          var tryPaths = [];
          [CANON, "OGTnew"].forEach(function (v) {
            var path = buildPath(v);
            if (tryPaths.indexOf(path) === -1) tryPaths.push(path);
          });
          tryPaths = expandWithSlashVariants(tryPaths);
          tryPaths.sort(function (a, b) {
            function rank(path) {
              var r = 0;
              var pl = path.toLowerCase();
              if (!path.endsWith("/")) r += 2;
              var hasCanon =
                pl.indexOf("/ogt/") !== -1 ||
                pl === "/ogt" ||
                pl.endsWith("/ogt");
              var hasLegacy = pl.indexOf("/ogtnew") !== -1;
              if (!hasCanon && hasLegacy) r += 1;
              return r;
            }
            return rank(a) - rank(b);
          });

          var changed = false;
          for (var j = 0; j < segs.length; j++) {
            if (isOgtAppSeg(segs[j]) && segs[j] !== CANON) {
              segs[j] = CANON;
              changed = true;
            }
          }
          if (changed) {
            var next = segs.join("/");
            if (next === "") next = "/";
            if (p.endsWith("/") && !next.endsWith("/")) next += "/";
            var lastSeg = -1;
            for (var k = segs.length - 1; k >= 0; k--) {
              if (segs[k]) {
                lastSeg = k;
                break;
              }
            }
            if (
              lastSeg === idx &&
              !next.endsWith("/") &&
              isOgtAppSeg(segs[idx])
            ) {
              next += "/";
            }
            loc.replace(loc.origin + next + loc.search + loc.hash);
            return;
          }

          for (var i = 0; i < tryPaths.length; i++) {
            var path = tryPaths[i];
            try {
              if (await tryFetch(path, "HEAD")) {
                loc.replace(loc.origin + path + loc.search + loc.hash);
                return;
              }
            } catch (e) {}
            try {
              if (await tryFetch(path, "GET")) {
                loc.replace(loc.origin + path + loc.search + loc.hash);
                return;
              }
            } catch (e2) {}
          }
        }

        run();
      })();
    </script>
  </head>
  <body>
    <p>Page not found.</p>
  </body>
</html>
