<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>LO Arcade – Games</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --lo-blue: #4C6FFF;
      --lo-yellow: #FFDD55;
      --lo-bg-top: #6DE0FF;
      --lo-bg-bottom: #4C6FFF;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: "Fredoka", sans-serif;
      background: linear-gradient(180deg, var(--lo-bg-top) 0%, var(--lo-bg-bottom) 100%);
      color: #ffffff;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: stretch;
    }

    .page {
      position: relative;
      width: 100%;
      min-height: 100vh;
      overflow: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      background-image: url("assets/mainbg.webp");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 0;
    }

    .bg-overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(
        180deg,
        rgba(0, 0, 0, 0.25) 0%,
        rgba(0, 0, 0, 0.45) 50%,
        rgba(0, 0, 0, 0.65) 100%
      );
      z-index: 1;
    }

    .content {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 32px 16px;
    }

    .card {
      width: 100%;
      max-width: 480px;
      background: rgba(0, 0, 0, 0.35);
      border-radius: 24px;
      padding: 24px 20px 28px;
      backdrop-filter: blur(10px);
      box-shadow:
        0 18px 40px rgba(0, 0, 0, 0.55),
        0 0 0 2px rgba(255, 255, 255, 0.12);
      text-align: center;
    }

    .logo-wrapper {
      margin-bottom: 12px;
    }

    .logo {
      max-width: 220px;
      width: 70%;
      height: auto;
      display: block;
      margin: 0 auto;
    }

    .title {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin: 4px 0 18px 0;
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 4px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 14px 20px;
      border-radius: 16px;
      border: none;
      font-family: "Fredoka", sans-serif;
      font-size: 17px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      transition:
        transform 0.15s ease,
        box-shadow 0.15s ease,
        background 0.15s ease,
        color 0.15s ease;
      box-shadow: 0 6px 0 rgba(0, 0, 0, 0.55),
                  0 12px 26px rgba(0, 0, 0, 0.45);
      letter-spacing: 0.02em;
    }

    .btn span {
      pointer-events: none;
    }

    .btn-yellow {
      background: linear-gradient(180deg, #FFE986 0%, var(--lo-yellow) 90%);
      color: #1a1a2e;
    }

    .btn-blue {
      background: linear-gradient(180deg, #6DE0FF 0%, var(--lo-blue) 90%);
      color: #ffffff;
    }

    .btn:hover:not(.btn-disabled) {
      transform: translateY(-3px);
      box-shadow: 0 10px 0 rgba(0, 0, 0, 0.6),
                  0 18px 36px rgba(0, 0, 0, 0.6);
    }

    .btn:active:not(.btn-disabled) {
      transform: translateY(0);
      box-shadow: 0 4px 0 rgba(0, 0, 0, 0.5),
                  0 10px 24px rgba(0, 0, 0, 0.5);
    }

    .btn-disabled {
      opacity: 0.6;
      cursor: default;
    }

    .btn-disabled:hover,
    .btn-disabled:active {
      transform: none;
      box-shadow: 0 6px 0 rgba(0, 0, 0, 0.55),
                  0 12px 26px rgba(0, 0, 0, 0.45);
    }

    .footnote {
      margin-top: 14px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.8);
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 10px;
      padding: 10px 16px;
      border-radius: 14px;
      border: none;
      font-family: "Fredoka", sans-serif;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      background: rgba(0, 0, 0, 0.35);
      color: #ffffff;
      box-shadow: 0 4px 0 rgba(0, 0, 0, 0.55),
                  0 10px 22px rgba(0, 0, 0, 0.4);
      letter-spacing: 0.02em;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    .btn-back:hover {
      transform: translateY(-2px);
      box-shadow: 0 7px 0 rgba(0, 0, 0, 0.6),
                  0 14px 28px rgba(0, 0, 0, 0.6);
    }

    .btn-back:active {
      transform: translateY(0);
      box-shadow: 0 3px 0 rgba(0, 0, 0, 0.5),
                  0 8px 18px rgba(0, 0, 0, 0.5);
    }

    @media (max-width: 480px) {
      .card {
        padding: 20px 16px 24px;
        border-radius: 20px;
      }

      .logo {
        max-width: 200px;
      }

      .title {
        font-size: 22px;
      }

      .btn {
        font-size: 16px;
        padding: 13px 18px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="bg"></div>
    <div class="bg-overlay"></div>

    <div class="content">
      <div class="card">
        <div class="logo-wrapper">
          <img src="assets/websitelogo.webp" alt="Little Ollie Labs" class="logo" />
        </div>
        <h1 class="title">LO Arcade</h1>

        <div class="stack">
          <a href="/games/one-button-hero/" class="btn btn-yellow">
            <span>PLAY ONE BUTTON HERO</span>
          </a>

          <a href="/games/slider-puzzle/index.html" class="btn btn-blue">
            <span>PLAY SLIDER PUZZLE</span>
          </a>

          <button class="btn btn-yellow btn-disabled" type="button" disabled>
            <span>COMING SOON</span>
          </button>
        </div>

        <a href="/links.html" class="btn-back">← Back</a>

        <div class="footnote">
          Little Ollie Labs • Version 0.1
        </div>
      </div>
    </div>
  </div>
</body>
</html>
