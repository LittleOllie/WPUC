<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        try {
          var k = "lo-labs-theme";
          var t = localStorage.getItem(k);
          if (t === "light" || t === "dark") {
            document.documentElement.setAttribute("data-theme", t);
          } else {
            document.documentElement.setAttribute("data-theme", "dark");
          }
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OGT Vote</title>
    <meta name="description" content="Simple real-time voting for the OGT team." />

    <link rel="icon" href="/flexgrid/site/src/assets/images/LO.png" type="image/png" sizes="any" />
    <link rel="shortcut icon" href="/flexgrid/site/src/assets/images/LO.png" type="image/png" />
    <link rel="apple-touch-icon" href="/flexgrid/site/src/assets/images/LO.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/OGT/public/style.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page">
      <nav class="page-nav" aria-label="Site navigation">
        <button type="button" class="back-to-menu" id="btn-nav-home">← Back to links</button>
        <button
          type="button"
          class="theme-toggle"
          id="theme-toggle"
          role="switch"
          aria-checked="false"
          aria-label="Switch to light theme"
        >
          <span class="theme-toggle__track">
            <span class="theme-toggle__icon theme-toggle__icon--sun" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <circle cx="12" cy="12" r="3.5" stroke="currentColor" stroke-width="2" />
                <path
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  d="M12 2v2M12 20v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M2 12h2M20 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"
                />
              </svg>
            </span>
            <span class="theme-toggle__icon theme-toggle__icon--moon" aria-hidden="true">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path fill="currentColor" d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
              </svg>
            </span>
            <span class="theme-toggle__thumb" aria-hidden="true"></span>
          </span>
        </button>
      </nav>

      <div class="brand-bar">
        <div class="brand-bar__logos">
          <img
            class="brand-bar__img brand-bar__img--lo"
            src="/flexgrid/site/src/assets/images/LO.png"
            width="200"
            height="64"
            alt="Little Ollie"
          />
          <span class="brand-bar__x" aria-hidden="true">×</span>
          <img
            class="brand-bar__img brand-bar__img--og"
            src="/ogtriplelogo.png"
            width="96"
            height="96"
            alt="ogtriple media"
          />
        </div>
      </div>

      <header class="hero">
        <p class="eyebrow">LO LABS UTILITY - OGTriple Media</p>
        <div class="hero__headline">
          <h1>OGT Vote</h1>
        </div>
        <p class="lede">Simple voting for the OGT community.</p>
      </header>

      <main id="app" class="ogtvote-app" aria-live="polite"></main>

      <footer class="footer">
        <p class="footer__credit">Powered By Little Ollie Labs</p>
        <p class="footer__flexgrid">
          <a
            class="footer__flexgrid-btn"
            href="https://littleollielabs.com/flexgrid/"
            target="_blank"
            rel="noopener noreferrer"
            >For other collections, check out Flex Grid</a>
        </p>
      </footer>
    </div>

    <div
      id="ogtvote-loading"
      class="global-loading global-loading--indeterminate"
      aria-hidden="true"
      aria-busy="true"
    >
      <div class="global-loading__backdrop" aria-hidden="true"></div>
      <div class="global-loading__panel">
        <div class="global-loading__spin-wrap">
          <img
            class="global-loading__img"
            src="/ogtriplelogo.png"
            width="120"
            height="120"
            alt=""
            decoding="async"
          />
        </div>
        <p id="ogtvote-loading-label" class="global-loading__label" aria-live="polite"></p>
        <div class="global-loading__pill" aria-hidden="true">
          <div class="global-loading__pill-fill"></div>
        </div>
      </div>
    </div>

    <template id="tpl-landing">
      <div class="ogtvote-hub">
        <div class="ogtvote-hub__divider ogtvote-hub__divider--top" aria-hidden="true"></div>
        <p id="ogtvote-welcome" class="ogtvote-hub__welcome" hidden></p>
        <p class="ogtvote-hub__tagline">Choose what you want to do.</p>
        <div class="ogtvote-hub__actions">
          <button type="button" class="btn-primary ogtvote-hub__btn" data-flow="create">🗳️ Create new vote</button>
          <div class="ogtvote-hub__divider" aria-hidden="true"></div>
          <button type="button" class="btn-primary ogtvote-hub__btn" data-flow="join">🔑 Join existing</button>
          <div class="ogtvote-hub__divider" aria-hidden="true"></div>
          <button type="button" class="btn-primary ogtvote-hub__btn" data-flow="history">📚 See previous votes</button>
        </div>
        <div class="input-row ogtvote-input-row--tight-top ogtvote-hub__authrow">
          <button id="btn-signout" type="button" class="btn-secondary" hidden>🚪 Sign out</button>
        </div>
      </div>
    </template>

    <template id="tpl-flow-create">
      <div class="ogtvote-flow">
        <button type="button" class="ogtvote-flow__back back-to-menu">🏠 Home</button>
        <section class="panel mode-panel ogtvote-flow__panel">
          <h2 class="mode-title">Create vote</h2>
          <label class="field-label" for="flow-create-name">Vote name</label>
          <div class="input-row">
            <input id="flow-create-name" type="text" placeholder="e.g. Week 12 picks" autocomplete="off" />
          </div>
          <label class="field-label" for="flow-create-desc">Description (optional)</label>
          <div class="input-row">
            <textarea
              id="flow-create-desc"
              class="wallet-input-multiline"
              rows="2"
              placeholder="Short context for the team"
            ></textarea>
          </div>
          <p class="field-label ogtvote-field-label--spaced" id="flow-vt-label">Voting type</p>
          <div class="flex-modal__collection-row" role="radiogroup" aria-labelledby="flow-vt-label">
            <label class="flex-collection-pill">
              <input type="radio" name="flow-voting-type" class="flex-collection-pill__input" value="top1" />
              <span class="flex-collection-pill__label">Top 1</span>
            </label>
            <label class="flex-collection-pill">
              <input
                type="radio"
                name="flow-voting-type"
                class="flex-collection-pill__input"
                value="top3"
                checked
              />
              <span class="flex-collection-pill__label">Top 3</span>
            </label>
          </div>
          <div class="input-row ogtvote-input-row--tight-top">
            <button id="flow-btn-create" class="btn-primary" type="button">🗳️ Create vote</button>
          </div>
          <div id="flow-create-status" class="status" role="status" aria-live="polite"></div>
        </section>
      </div>
    </template>

    <template id="tpl-flow-join">
      <div class="ogtvote-flow">
        <button type="button" class="ogtvote-flow__back back-to-menu">🏠 Home</button>
        <section class="panel mode-panel ogtvote-flow__panel">
          <h2 class="mode-title">Join vote</h2>
          <label class="field-label" for="flow-join-code">Room code</label>
          <div class="input-row">
            <input id="flow-join-code" type="text" placeholder="OGT-1234" autocomplete="off" />
          </div>
          <div class="input-row ogtvote-input-row--tight-top">
            <button id="flow-btn-join" class="btn-primary" type="button">🔑 Join vote</button>
          </div>
          <div id="flow-join-status" class="status" role="status" aria-live="polite"></div>
        </section>
      </div>
    </template>

    <template id="tpl-flow-history">
      <div class="ogtvote-flow">
        <button type="button" class="ogtvote-flow__back back-to-menu">🏠 Home</button>
        <section class="panel mode-panel ogtvote-flow__panel">
          <h2 class="mode-title">Previous votes</h2>
          <p class="mode-desc">Tap a room to open it.</p>
          <div id="flow-history-list" class="ogtvote-history-list" aria-live="polite"></div>
        </section>
      </div>
    </template>

    <template id="tpl-flow-login">
      <div class="ogtvote-flow ogtvote-login">
        <section class="panel mode-panel ogtvote-flow__panel">
          <h2 class="mode-title">Login</h2>
          <p class="mode-desc">Use a username + password so your votes stay yours on any device.</p>

          <label class="field-label" for="auth-username">Username</label>
          <div class="input-row">
            <input id="auth-username" type="text" placeholder="e.g. ollie" autocomplete="username" />
          </div>

          <label class="field-label" for="auth-password">Password</label>
          <div class="input-row">
            <input id="auth-password" type="password" placeholder="6+ characters" autocomplete="current-password" />
          </div>

          <div class="input-row ogtvote-input-row--tight-top">
            <button id="btn-auth-login" class="btn-primary" type="button">🔐 Log in</button>
            <button id="btn-auth-signup" class="btn-secondary" type="button">✨ Sign up</button>
          </div>
          <div id="auth-status" class="status" role="status" aria-live="polite"></div>
        </section>
      </div>
    </template>

    <template id="tpl-room">
      <div class="room">
        <section class="lookup-shell" id="vote-room-shell" aria-label="Vote dashboard">
          <button
            type="button"
            class="lookup-shell__toggle"
            id="vote-room-toggle"
            aria-expanded="true"
            aria-controls="vote-room-body"
          >
            <span class="lookup-shell__title-wrap">
              <span class="lookup-shell__title">Vote dashboard</span>
              <span class="lookup-shell__meta" id="room-code-meta"></span>
            </span>
            <span class="lookup-shell__chevron" aria-hidden="true"></span>
          </button>
          <div class="lookup-shell__body" id="vote-room-body">
            <div class="wallet-stats" aria-label="Vote details">
              <div class="wallet-stats__line">
                <span id="room-title" class="wallet-stats__matched"></span>
              </div>
              <div class="wallet-stats__line">
                <span id="room-desc"></span>
              </div>
            </div>

            <div class="flex-modal__collection-row" role="radiogroup" aria-label="Views">
              <label class="flex-collection-pill">
                <input
                  type="radio"
                  name="ogtvote-room-tab"
                  class="flex-collection-pill__input"
                  value="entries"
                  checked
                />
                <span class="flex-collection-pill__label">Entries</span>
              </label>
              <label class="flex-collection-pill">
                <input type="radio" name="ogtvote-room-tab" class="flex-collection-pill__input" value="vote" />
                <span class="flex-collection-pill__label">Vote</span>
              </label>
              <label class="flex-collection-pill">
                <input type="radio" name="ogtvote-room-tab" class="flex-collection-pill__input" value="results" />
                <span class="flex-collection-pill__label">Results</span>
              </label>
            </div>

            <section class="tabpane is-active" data-pane="entries" role="tabpanel">
              <div class="ogtvote-entries-head">
                <button id="btn-open-add-entry" class="btn-primary" type="button">➕ Add entry</button>
                <span id="entries-status" class="status ogtvote-entries-head__status" role="status" aria-live="polite"></span>
              </div>
              <h3 class="section-title">Entries</h3>
              <p class="section-blurb" id="entries-count"></p>
              <div id="entries-grid" class="entry-grid" aria-label="Entries"></div>
              <div class="input-row ogtvote-input-row--tight-top" style="margin: 0 1rem">
                <button id="btn-copy-code" class="btn-primary" type="button">📋 Copy code</button>
              </div>
            </section>

            <section class="tabpane" data-pane="vote" role="tabpanel">
              <section class="panel mode-panel">
                <h2 id="vote-title" class="mode-title">Your vote</h2>
                <p class="field-label">Tap cards in order: 🥇 then 🥈 then 🥉. Tap again to remove a rank.</p>
                <div id="rank-pills" class="flex-modal__collection-row"></div>
                <div id="vote-hint" class="status" role="status" aria-live="polite"></div>
                <div class="input-row ogtvote-input-row--tight-top">
                  <button id="btn-clear-vote" class="btn-secondary" type="button">🧹 Clear</button>
                  <button id="btn-submit-vote" class="btn-primary" type="button">✅ Save vote</button>
                </div>
              </section>
              <div id="vote-grid" class="entry-grid" aria-label="Vote grid"></div>
            </section>

            <section class="tabpane" data-pane="results" role="tabpanel">
              <section class="panel mode-panel">
                <h2 id="results-title" class="mode-title">Leaderboard</h2>
                <div id="leaderboard" class="leaderboard" aria-label="Leaderboard"></div>
                <div id="votes-count" class="status" role="status" aria-live="polite"></div>
              </section>
            </section>
          </div>
        </section>

        <div class="ogtvote-bottombar" aria-label="Admin actions">
          <button id="btn-finish" class="btn-primary ogtvote-bottombar__btn" type="button" hidden>🏁 Finish voting</button>
        </div>

        <div
          id="entry-modal"
          class="welcome-modal"
          aria-hidden="true"
          role="dialog"
          aria-modal="true"
          aria-labelledby="entry-modal-title"
        >
          <div class="welcome-modal__backdrop" id="entry-modal-backdrop" aria-hidden="true"></div>
          <div class="welcome-modal__panel">
            <button type="button" class="welcome-modal__close" id="entry-modal-close" aria-label="Close">×</button>
            <h2 id="entry-modal-title" class="welcome-modal__title">Add entry</h2>
            <label class="field-label" for="m-entry-url">Tweet URL</label>
            <div class="input-row">
              <input id="m-entry-url" type="text" placeholder="https://x.com/.../status/123" autocomplete="off" />
            </div>
            <label class="field-label" for="m-entry-image">Image</label>
            <div class="ogtvote-dropzone" id="m-image-drop" tabindex="0" role="button" aria-label="Paste or drop an image here">
              <div class="input-row">
                <input id="m-entry-image" class="ogtvote-file" type="file" accept="image/*" />
              </div>
              <p class="hint ogtvote-dropzone__hint">Paste (Cmd+V) or drag &amp; drop an image here.</p>
              <div class="ogtvote-dropzone__preview" id="m-image-preview" hidden>
                <img id="m-image-preview-img" alt="Selected entry image preview" />
              </div>
            </div>
            <p class="hint">Upload the image from your tweet for best display.</p>
            <label class="field-label" for="m-entry-user">Username (optional)</label>
            <div class="input-row">
              <input id="m-entry-user" type="text" placeholder="@handle" autocomplete="off" />
            </div>
            <div class="input-row ogtvote-input-row--tight-top">
              <button id="m-entry-save" class="btn-primary" type="button">✅ Save entry</button>
            </div>
            <div id="m-entry-status" class="status" role="status" aria-live="polite"></div>
          </div>
        </div>
      </div>
    </template>

    <script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore-compat.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
